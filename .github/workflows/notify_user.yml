name: Notify Issue Author

on: [push]

jobs:
  notify-author:
    runs-on: ubuntu-latest
    steps:
      - name: Check if push is from a pull request branch
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          count=$(gh pr list --repo "$REPO" --head "$REF_NAME" --state open --json number --jq 'length')
          echo "has_pr=$([ "$count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Extract issue number from commit message
        if: steps.check_pr.outputs.has_pr == 'false'
        id: extract_issue
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        shell: bash
        run: |
          if [[ "$COMMIT_MESSAGE" =~ \#([0-9]+) ]]; then
            echo "issue_number=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on issue
        if: steps.check_pr.outputs.has_pr == 'false' && steps.extract_issue.outputs.issue_number != ''
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ steps.extract_issue.outputs.issue_number }}
          body: |
            Hello, and thank you for your report.

            A new commit that may address this issue has been pushed:
            ${{ github.event.head_commit.url }}

            Please try the latest nightly build once it becomes available and check whether the issue is resolved.

            If the issue is fixed in the nightly build, please close this issue. If it is still reproducible, leave a comment with any updated details so we can continue investigating.

      - name: Skip when no issue number is present
        if: steps.check_pr.outputs.has_pr == 'false' && steps.extract_issue.outputs.issue_number == ''
        run: echo "No issue reference found in the head commit message; skipping comment."
