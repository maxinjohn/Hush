name: Bump to new version
on:
  workflow_dispatch:

jobs:
  check-version:
    if: contains(github.ref, 'refs/tags') == false
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check_version.outputs.version_changed }}
      new_version: ${{ steps.check_version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
      
      - name: Check version and Tag
        id: check_version
        run: |
          if [ ! -f app/build.gradle.kts ]; then
            echo "Error: app/build.gradle.kts does not exist"
            exit 1
          fi

          # 1. Extract the version from Gradle (using your regex)
          NEW_VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "")
          
          if [ -z "$NEW_VERSION" ]; then
            echo "Error: Could not find versionName in app/build.gradle.kts"
            exit 1
          fi

          # 2. ALWAYS Output the detected version (Fixes the missing output bug)
          echo "Detected version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # 3. Check if this version is already released (Tag Existence Check)
          if git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag v$NEW_VERSION already exists. Skipping release."
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v$NEW_VERSION does not exist. Proceeding with release."
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug output
        run: |
          echo "version_changed: ${{ steps.check_version.outputs.version_changed }}"
          echo "new_version: ${{ steps.check_version.outputs.new_version }}"

  sync-release-docs:
    if: contains(github.ref, 'refs/tags') == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Regenerate README, CHANGELOG, and release notes
        run: |
          chmod +x scripts/sync-release-docs.sh scripts/generate-release-notes.sh
          bash scripts/sync-release-docs.sh

      - name: Commit and push doc updates
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md release_notes/
          if git diff --staged --quiet; then
            echo "Release docs already up to date."
            exit 0
          fi
          git commit -m "chore: sync release docs for bump workflow [skip ci]"
          git push

  reproducibility:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Apply Hush submodule patches
        run: |
          chmod +x scripts/apply-submodule-patches.sh
          bash scripts/apply-submodule-patches.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify reproducible unsigned universal APK
        shell: bash
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
          TOGETHER_BEARER_TOKEN: ${{ secrets.TOGETHER_BEARER_TOKEN }}
          CANVAS_BEARER_TOKEN: ${{ secrets.CANVAS_BEARER_TOKEN }}
          EXTRACTOR_BEARER: ${{ secrets.EXTRACTOR_BEARER }}
          HUSH_UNSIGNED_RELEASE_BUILD: "true"
        run: |
          set -euo pipefail
          DEVICE="mobile"
          DEVICE_CAP="Mobile"
          ABI="universal"
          ABI_CAP="Universal"

          locate_universal_apk() {
            local apk
            local metadata
            local output_file
            local base_dir
            local candidate

            for dir in \
              "app/build/outputs/apk/gms${DEVICE_CAP}${ABI_CAP}/release" \
              "app/build/outputs/apk/gms${DEVICE}${ABI_CAP}/release" \
              "app/build/outputs/apk/gms/${DEVICE}/${ABI}/release" \
              "app/build/outputs/apk/gms/${DEVICE}${ABI_CAP}/release" \
              "app/build/outputs/apk/gms/${DEVICE_CAP}${ABI_CAP}/release" \
              "app/build/outputs/apk/${DEVICE}/${ABI}/release" \
              "app/build/outputs/apk/${DEVICE}${ABI_CAP}/release" \
              "app/build/outputs/apk/${DEVICE_CAP}${ABI_CAP}/release"
            do
              [ -d "$dir" ] || continue

              apk="$(find "$dir" -maxdepth 1 -type f -name "*-unsigned.apk" | head -n 1 || true)"
              if [ -n "${apk:-}" ] && [ -f "$apk" ]; then
                echo "$apk"
                return 0
              fi

              apk="$(find "$dir" -maxdepth 1 -type f -name "*.apk" ! -name "*-signed.apk" ! -name "*-unsigned-signed.apk" | head -n 1 || true)"
              if [ -n "${apk:-}" ] && [ -f "$apk" ]; then
                echo "$apk"
                return 0
              fi
            done

            metadata="$(
              find app/build/outputs/apk -type f -name "output-metadata.json" \
                \( \
                  -path "*/gms${DEVICE_CAP}${ABI_CAP}/release/output-metadata.json" -o \
                  -path "*/gms${DEVICE}${ABI_CAP}/release/output-metadata.json" -o \
                  -path "*/gms/${DEVICE}/${ABI}/release/output-metadata.json" -o \
                  -path "*/gms/${DEVICE}${ABI_CAP}/release/output-metadata.json" -o \
                  -path "*/gms/${DEVICE_CAP}${ABI_CAP}/release/output-metadata.json" -o \
                  -path "*/${DEVICE}/${ABI}/release/output-metadata.json" -o \
                  -path "*/${DEVICE}${ABI_CAP}/release/output-metadata.json" -o \
                  -path "*/${DEVICE_CAP}${ABI_CAP}/release/output-metadata.json" -o \
                  -path "*/gms${DEVICE_CAP}${ABI_CAP}/*/release/output-metadata.json" -o \
                  -path "*/gms${DEVICE}${ABI_CAP}/*/release/output-metadata.json" -o \
                  -path "*/gms/${DEVICE}/${ABI}/*/release/output-metadata.json" -o \
                  -path "*/gms/${DEVICE}${ABI_CAP}/*/release/output-metadata.json" -o \
                  -path "*/gms/${DEVICE_CAP}${ABI_CAP}/*/release/output-metadata.json" -o \
                  -path "*/${DEVICE}/${ABI}/*/release/output-metadata.json" -o \
                  -path "*/${DEVICE}${ABI_CAP}/*/release/output-metadata.json" -o \
                  -path "*/${DEVICE_CAP}${ABI_CAP}/*/release/output-metadata.json" \
                \) \
                | head -n 1 || true
            )"
            if [ -n "${metadata:-}" ]; then
              output_file="$(grep -oP '"outputFile"\s*:\s*"\K[^"]+' "$metadata" | head -n 1 || true)"
              if [ -n "${output_file:-}" ]; then
                base_dir="$(dirname "$metadata")"
                candidate="$base_dir/$output_file"
                if [ -f "$candidate" ]; then
                  echo "$candidate"
                  return 0
                fi
              fi
            fi

            apk="$(find app/build/outputs/apk -type f -name "*-unsigned.apk" \
              \( \
                -path "*/gms${DEVICE_CAP}${ABI_CAP}/*" -o \
                -path "*/gms${DEVICE}${ABI_CAP}/*" -o \
                -path "*/gms/${DEVICE}/${ABI}/*" -o \
                -path "*/gms/${DEVICE}${ABI_CAP}/*" -o \
                -path "*/gms/${DEVICE_CAP}${ABI_CAP}/*" -o \
                -path "*/${DEVICE}/${ABI}/*" -o \
                -path "*/${DEVICE}${ABI_CAP}/*" -o \
                -path "*/${DEVICE_CAP}${ABI_CAP}/*" \
              \) | head -n 1 || true)"
            if [ -n "${apk:-}" ] && [ -f "$apk" ]; then
              echo "$apk"
              return 0
            fi

            apk="$(find app/build/outputs/apk -type f -name "*.apk" ! -name "*-signed.apk" ! -name "*-unsigned-signed.apk" \
              \( \
                -path "*/gms${DEVICE_CAP}${ABI_CAP}/*" -o \
                -path "*/gms${DEVICE}${ABI_CAP}/*" -o \
                -path "*/gms/${DEVICE}/${ABI}/*" -o \
                -path "*/gms/${DEVICE}${ABI_CAP}/*" -o \
                -path "*/gms/${DEVICE_CAP}${ABI_CAP}/*" -o \
                -path "*/${DEVICE}/${ABI}/*" -o \
                -path "*/${DEVICE}${ABI_CAP}/*" -o \
                -path "*/${DEVICE_CAP}${ABI_CAP}/*" \
              \) | head -n 1 || true)"
            if [ -n "${apk:-}" ] && [ -f "$apk" ]; then
              echo "$apk"
              return 0
            fi

            return 1
          }

          build_with_shims() {
            ./gradlew :waze-shim:assembleSpotifyRelease :waze-shim:assembleYoutubeMusicRelease
            mkdir -p "${{ github.workspace }}/app/src/main/assets/"
            cd waze-shim/build/outputs/apk
            rm -f waze-shims.zip
            SOURCE_DATE_EPOCH=0 zip -j waze-shims.zip spotify/release/waze-shim-spotify-release.apk youtubeMusic/release/waze-shim-youtubeMusic-release.apk
            cp waze-shims.zip "${{ github.workspace }}/app/src/main/assets/"
            cd "${{ github.workspace }}"
          }

          normalize_apk() {
            python3 -c "import hashlib, sys, zipfile; archive = zipfile.ZipFile(sys.argv[1]); print(hashlib.sha256(b''.join(name.encode() + b'\\0' + archive.read(name) for name in sorted(archive.namelist()))).hexdigest())" "$1"
          }

          export SOURCE_DATE_EPOCH=0

          build_with_shims
          ./gradlew clean assembleGmsMobileUniversalRelease
          APK_1="$(locate_universal_apk || true)"
          if [ -z "${APK_1:-}" ] || [ ! -f "$APK_1" ]; then
            echo "Could not find unsigned universal release APK (first build)."
            find app/build/outputs/apk -maxdepth 6 -type f -print || true
            exit 1
          fi
          cp "$APK_1" /tmp/universal-1.apk

          build_with_shims
          ./gradlew clean assembleGmsMobileUniversalRelease
          APK_2="$(locate_universal_apk || true)"
          if [ -z "${APK_2:-}" ] || [ ! -f "$APK_2" ]; then
            echo "Could not find unsigned universal release APK (second build)."
            find app/build/outputs/apk -maxdepth 6 -type f -print || true
            exit 1
          fi
          cp "$APK_2" /tmp/universal-2.apk

          SHA_1="$(normalize_apk /tmp/universal-1.apk)"
          SHA_2="$(normalize_apk /tmp/universal-2.apk)"

          echo "sha256 #1 (normalized): $SHA_1"
          echo "sha256 #2 (normalized): $SHA_2"
          test "$SHA_1" = "$SHA_2"

  build:
    name: Build Release APKs
    needs: [check-version, reproducibility]
    # Removed '|| workflow_dispatch' so it respects the version check
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - device: mobile
            distribution: gms
            distributionName: Gms
            deviceName: Mobile
            abi: universal
          - device: tv
            distribution: gms
            distributionName: Gms
            deviceName: Tv
            abi: universal
          - device: mobile
            distribution: foss
            distributionName: Foss
            deviceName: Mobile
            abi: universal

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Apply Hush submodule patches
        run: |
          chmod +x scripts/apply-submodule-patches.sh
          bash scripts/apply-submodule-patches.sh
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: on-success

      - name: Validate release signing secrets
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bash .github/scripts/validate-signing-secrets.sh
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare stable Waze shim signing
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bash .github/scripts/prepare-shim-signing.sh

      - name: Resolve variant names
        id: variant
        shell: bash
        run: |
          set -euo pipefail
          DISTRIBUTION="${{ matrix.distribution }}"
          DISTRIBUTION_CAP="${{ matrix.distributionName }}"
          DEVICE="${{ matrix.device }}"
          ABI="${{ matrix.abi }}"
          DEVICE_CAP="${{ matrix.deviceName }}"
          ABI_CAP="$(tr '[:lower:]' '[:upper:]' <<< "${ABI:0:1}")${ABI:1}"
          echo "distribution=$DISTRIBUTION" >> "$GITHUB_OUTPUT"
          echo "distribution_cap=$DISTRIBUTION_CAP" >> "$GITHUB_OUTPUT"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "abi=$ABI" >> "$GITHUB_OUTPUT"
          echo "device_cap=$DEVICE_CAP" >> "$GITHUB_OUTPUT"
          echo "abi_cap=$ABI_CAP" >> "$GITHUB_OUTPUT"
          echo "gradle_task=assemble${DISTRIBUTION_CAP}${DEVICE_CAP}${ABI_CAP}Release" >> "$GITHUB_OUTPUT"
          echo "artifact_name=hush-${DISTRIBUTION}-${DEVICE}-${ABI}-release" >> "$GITHUB_OUTPUT"
          echo "apk_name=hush-${DISTRIBUTION}-${DEVICE}-${ABI}-release.apk" >> "$GITHUB_OUTPUT"
 
      - name: Build Waze shim APKs (fresh for each CI run)
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew :waze-shim:assembleSpotifyRelease :waze-shim:assembleYoutubeMusicRelease --no-daemon
          mkdir -p "${{ github.workspace }}/app/src/main/assets/"
          cd waze-shim/build/outputs/apk
          rm -f waze-shims.zip
          zip -j waze-shims.zip spotify/release/waze-shim-spotify-release.apk youtubeMusic/release/waze-shim-youtubeMusic-release.apk
          cp waze-shims.zip "${{ github.workspace }}/app/src/main/assets/"

      - name: Build Release APK
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_TASK="${{ steps.variant.outputs.gradle_task }}"
          ABI="${{ matrix.abi }}"

          if [ "$ABI" = "armeabi" ] || [ "$ABI" = "x86" ]; then
            ./gradlew "$GRADLE_TASK" 2>&1 | python3 -c "import re,sys;p=re.compile(r'^(WARNING: )?\[CXX5202\] This app only has 32-bit \[(armeabi-v7a|x86)\] native libraries\. Beginning August 1, 2019 Google Play store requires that all apps that include native libraries must provide 64-bit versions\. For more information, visit https://g\.co/64-bit-requirement\$');[sys.stdout.write(l) for l in sys.stdin if not p.match(l.rstrip())]"
          else
            ./gradlew "$GRADLE_TASK"
          fi
        env:
          PULL_REQUEST: 'false'
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
          TOGETHER_BEARER_TOKEN: ${{ secrets.TOGETHER_BEARER_TOKEN }}
          CANVAS_BEARER_TOKEN: ${{ secrets.CANVAS_BEARER_TOKEN }}
          EXTRACTOR_BEARER: ${{ secrets.EXTRACTOR_BEARER }}

      - name: Resolve release output directory
        id: release_dir
        shell: bash
        run: |
          set -euo pipefail
          DISTRIBUTION="${{ steps.variant.outputs.distribution }}"
          DEVICE="${{ steps.variant.outputs.device }}"
          ABI="${{ steps.variant.outputs.abi }}"
          DEVICE_CAP="${{ steps.variant.outputs.device_cap }}"
          ABI_CAP="${{ steps.variant.outputs.abi_cap }}"
          CANDIDATES=(
            "app/build/outputs/apk/${DISTRIBUTION}${DEVICE_CAP}${ABI_CAP}/release"
            "app/build/outputs/apk/${DISTRIBUTION}${DEVICE}${ABI_CAP}/release"
            "app/build/outputs/apk/${DISTRIBUTION}/${DEVICE}/${ABI}/release"
            "app/build/outputs/apk/${DISTRIBUTION}/${DEVICE}${ABI_CAP}/release"
            "app/build/outputs/apk/${DISTRIBUTION}/${DEVICE_CAP}${ABI_CAP}/release"
            "app/build/outputs/apk/gms${DEVICE_CAP}${ABI_CAP}/release"
            "app/build/outputs/apk/gms${DEVICE}${ABI_CAP}/release"
            "app/build/outputs/apk/gms/${DEVICE}/${ABI}/release"
            "app/build/outputs/apk/gms/${DEVICE}${ABI_CAP}/release"
            "app/build/outputs/apk/gms/${DEVICE_CAP}${ABI_CAP}/release"
            "app/build/outputs/apk/${DEVICE}/${ABI}/release"
            "app/build/outputs/apk/${DEVICE}${ABI_CAP}/release"
            "app/build/outputs/apk/${DEVICE_CAP}${ABI_CAP}/release"
            "app/build/outputs/apk/${ABI}/${DEVICE}/release"
          )
          for d in "${CANDIDATES[@]}"; do
            if [ -d "$d" ]; then
              echo "release_dir=$d" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          FOUND_METADATA="$(
            find app/build/outputs/apk -type f -name "output-metadata.json" \
              \( \
                -path "*/${DISTRIBUTION}/${DEVICE}/${ABI}/release/output-metadata.json" -o \
                -path "*/${DISTRIBUTION}${DEVICE}${ABI_CAP}/release/output-metadata.json" -o \
                -path "*/${DISTRIBUTION}${DEVICE_CAP}${ABI_CAP}/release/output-metadata.json" -o \
                -path "*/${DISTRIBUTION}/${DEVICE}/${ABI}/*/release/output-metadata.json" -o \
                -path "*/${DISTRIBUTION}${DEVICE}${ABI_CAP}/*/release/output-metadata.json" -o \
                -path "*/${DISTRIBUTION}${DEVICE_CAP}${ABI_CAP}/*/release/output-metadata.json" -o \
                -path "*/${DEVICE}/${ABI}/release/output-metadata.json" -o \
                -path "*/${DEVICE}${ABI_CAP}/release/output-metadata.json" -o \
                -path "*/${DEVICE_CAP}${ABI_CAP}/release/output-metadata.json" -o \
                -path "*/${ABI}/${DEVICE}/release/output-metadata.json" -o \
                -path "*/${DEVICE}/${ABI}/*/release/output-metadata.json" -o \
                -path "*/${DEVICE}${ABI_CAP}/*/release/output-metadata.json" -o \
                -path "*/${DEVICE_CAP}${ABI_CAP}/*/release/output-metadata.json" \
              \) \
              | head -n 1 || true
          )"
          if [ -n "${FOUND_METADATA:-}" ]; then
            echo "release_dir=$(dirname "$FOUND_METADATA")" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Could not resolve APK release output directory for DISTRIBUTION=$DISTRIBUTION DEVICE=$DEVICE ABI=$ABI"
          find app/build/outputs/apk -maxdepth 8 -type d -print || true
          exit 1

      - name: Prepare Android SDK for signing
        id: android_signing
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/setup-android-signing-env.sh | tee /tmp/android-signing-env.log
          echo "build_tools_version=$(grep '^build_tools_version=' /tmp/android-signing-env.log | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Sign APK
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: ${{ steps.release_dir.outputs.release_dir }}/
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: ${{ steps.android_signing.outputs.build_tools_version }}
      
      - name: Move signed APK
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DIR="${{ steps.release_dir.outputs.release_dir }}"
          mkdir -p "$RELEASE_DIR/out"
          SIGNED_APK="$(find "$RELEASE_DIR" -type f \( -name "*-signed.apk" -o -name "*-unsigned-signed.apk" \) | head -n 1)"
          if [ -z "${SIGNED_APK:-}" ] || [ ! -f "$SIGNED_APK" ]; then
            echo "Could not find signed APK in $RELEASE_DIR"
            find "$RELEASE_DIR" -maxdepth 2 -type f -print || true
            exit 1
          fi
          mv "$SIGNED_APK" "$RELEASE_DIR/out/${{ steps.variant.outputs.apk_name }}"
  
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.variant.outputs.artifact_name }}
          path: ${{ steps.release_dir.outputs.release_dir }}/out/${{ steps.variant.outputs.apk_name }}

      - name: Upload Waze shim APKs
        if: matrix.distribution == 'gms' && matrix.device == 'mobile'
        uses: actions/upload-artifact@v7
        with:
          name: waze-shim-apks
          path: waze-shim/build/outputs/apk/*/release/*.apk

  create-release:
    needs: [check-version, build]
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Download all APKs
        uses: actions/download-artifact@v8
        with:
          path: downloaded_artifacts/

      - name: Sync release notes for GitHub release
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.check-version.outputs.new_version }}
        run: |
          set -euo pipefail
          chmod +x scripts/sync-release-docs.sh scripts/generate-release-notes.sh
          bash scripts/sync-release-docs.sh
          NOTES_FILE="release_notes/v${RELEASE_VERSION}.md"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "${NOTES_FILE} is missing or empty."
            exit 1
          fi
          cp "$NOTES_FILE" release_notes.md
          echo "--- Release notes preview ---"
          head -n 80 release_notes.md
          if ! grep -q '^- ' release_notes.md; then
            echo "release_notes.md has no bullet entries."
            exit 1
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
          RELEASE_VERSION: ${{ needs.check-version.outputs.new_version }}
          RELEASE_TARGET: ${{ github.sha }}
        run: |
          set -euo pipefail
          MOBILE_UNIVERSAL_APK="$(find downloaded_artifacts/hush-gms-mobile-universal-release -name "*.apk" | head -n 1)"
          TV_UNIVERSAL_APK="$(find downloaded_artifacts/hush-gms-tv-universal-release -name "*.apk" 2>/dev/null | head -n 1 || true)"
          FOSS_UNIVERSAL_APK="$(find downloaded_artifacts/hush-foss-mobile-universal-release -name "*.apk" 2>/dev/null | head -n 1 || true)"
          WAZE_SPOTIFY_APK="$(find downloaded_artifacts/waze-shim-apks -name "*-spotify-*.apk" 2>/dev/null | head -n 1 || true)"
          WAZE_YTM_APK="$(find downloaded_artifacts/waze-shim-apks -name "*-youtubeMusic-*.apk" 2>/dev/null | head -n 1 || true)"

          RELEASE_ASSETS=("$MOBILE_UNIVERSAL_APK")
          if [ -n "${TV_UNIVERSAL_APK:-}" ] && [ -f "$TV_UNIVERSAL_APK" ]; then
            RELEASE_ASSETS+=("$TV_UNIVERSAL_APK")
          fi
          if [ -n "${FOSS_UNIVERSAL_APK:-}" ] && [ -f "$FOSS_UNIVERSAL_APK" ]; then
            RELEASE_ASSETS+=("$FOSS_UNIVERSAL_APK")
          fi
          if [ -n "${WAZE_SPOTIFY_APK:-}" ] && [ -f "$WAZE_SPOTIFY_APK" ]; then
            RELEASE_ASSETS+=("$WAZE_SPOTIFY_APK")
          fi
          if [ -n "${WAZE_YTM_APK:-}" ] && [ -f "$WAZE_YTM_APK" ]; then
            RELEASE_ASSETS+=("$WAZE_YTM_APK")
          fi

          if [ -z "${MOBILE_UNIVERSAL_APK:-}" ] || [ ! -f "$MOBILE_UNIVERSAL_APK" ]; then
            echo "Could not find hush-gms-mobile-universal-release APK artifact."
            find downloaded_artifacts -type f -print || true
            exit 1
          fi

          if [ ! -s release_notes.md ]; then
            echo "release_notes.md is missing or empty."
            exit 1
          fi

          gh release create "v${RELEASE_VERSION}" \
            --target "${RELEASE_TARGET}" \
            --title "${RELEASE_VERSION}" \
            --notes-file release_notes.md \
            "${RELEASE_ASSETS[@]}"
